<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCEND</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Montserrat', sans-serif;
}

body {
  background: black;
  color: white;
  scroll-behavior: smooth;
}

/* Sections */
section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* Title */
h1 {
  font-size: 5rem;
  font-weight: 900;
  letter-spacing: 8px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s forwards;
}

p {
  margin-top: 20px;
  max-width: 600px;
  font-size: 1.2rem;
  line-height: 1.6;
  opacity: 0;
  animation: fadeUp 1.5s forwards;
}

/* Coming Soon */
.coming {
  font-size: 4rem;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 10px white, 0 0 20px white;
}

/* Scroll indicator */
.scroll {
  position: absolute;
  bottom: 30px;
  font-size: 0.8rem;
  opacity: 0.6;
}

/* Animation */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<section>
  <h1>ASCEND</h1>
  <p>
    ASCEND is where streetwear meets strength. Built for those who push limits,
    break boundaries, and rise above. This isn’t just clothing — it’s a mindset.
  </p>
  <div class="scroll">SCROLL ↓</div>
</section>

<!-- PAGE 2 -->
<section>
  <div class="coming">COMING SOON</div>
</section>

</body>
</html>
